<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wascally Wabbits PD</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Wascally Wabbits PD" />
  <meta property="og:description" content="FiveM Law Enforcement Roleplay Server" />
  <meta property="og:image" content="https://wascallywabbits.games/logo.png?v=1" />
  <meta property="og:url" content="https://wascallywabbits.games" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0,0,0,0.75);
      padding: 40px;
      border-radius: 20px;
      border: 2px solid #1e3a8a;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    .logo {
      width: 300px;
      max-width: 90%;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 2.5rem;
    }

    p {
      color: #bbb;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 25px;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      transition: .3s;
    }

    .discord {
      background: #5865F2;
      color: white;
    }

    .discord:hover {
      background: #4752C4;
      transform: scale(1.05);
    }

    .cad {
      background: #b30000;
      color: white;
    }

    .cad:hover {
      background: #800000;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" class="logo" />

    <h1>Wascally Wabbits PD</h1>
    <p>FiveM Law Enforcement Roleplay Server</p>

    <div class="buttons">
      <a href="https://discord.gg/ttgQuRZWpY" class="btn discord" target="_blank">
        Join Discord
      </a>

      <a href="https://cad.wascallywabbits.games" class="btn cad" target="_blank">
        Sonoran CAD
      </a>
    </div>
  </div>
</body>
</html>
